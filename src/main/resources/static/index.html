<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Earthquakes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="mt-4">
<h2 class="d-flex justify-content-center">Earthquakes</h2>
<div class="d-flex justify-content-center">
    <input type="datetime-local" id="timeInput" class="form-control w-25">
    <button class="btn btn-success border" onclick="filterByTime()">Filter by Time</button>
</div>
<div class="d-flex justify-content-center p-4">
<button class="btn btn-primary border " onclick="fetchData()">Fetch Data</button>
</div>
<div class="d-flex justify-content-center">
<table class="table-striped table-bordered">
    <thead>
    <tr>
        <th>Magnitude</th>
        <th>Place</th>
        <th>Time</th>
        <th>Actions</th>
    </tr>

    </thead>
    <tbody id="tableBody"></tbody>
</table>
</div>
<div  class=" d-flex justify-content-center mt-3">
    <div id="map"  style="width: 600px; height: 450px"></div>
</div>
<script>
    function fetchData(){
        console.log("CLICK WORKS");
        fetch("http://localhost:8080/api/earthquakes/fetch")
            .then(()=>loadData());
    }
    function loadData(){
        fetch("http://localhost:8080/api/earthquakes")
            .then(res=> res.json())
            .then(data => {
                let body = document.getElementById("tableBody");
                body.innerHTML = "";
                clearMarkers();
                if(!data || data.length === 0){
                    body.innerHTML = `<tr>
<td colspan="4" class="text-center text-danger fw-bold">
⚠ No earthquakes stronger than 2.0 in the last hour
</td>`;
                    return;
                }
                data.forEach(eq => {
                    let row = `<tr>
                         <td>${eq.magnitude}</td>
                         <td>${eq.place}</td>
                         <td>${new Date(eq.time)}</td>
                         <td><button class="btn btn-danger btn-sm" onclick="deleteEarthquake('${eq.id}')">Delete</button></td>
                        </tr>
`;
                    body.innerHTML += row;
                    if (eq.latitude && eq.longitude){
                        L.marker([eq.latitude,eq.longitude])
                            .addTo(map)
                            .bindPopup(`M ${eq.magnitude}<br>${eq.place}`);
                    }
                })
            })

    }
    function filterByTime(){
        let dateValue = document.getElementById("timeInput").value;
        if (!dateValue){
            alert("Please select a date and time!");
            return;
        }
        let timestamp = new Date(dateValue).getTime();
        fetch(`http://localhost:8080/api/earthquakes/after?time=${timestamp}`)
            .then(res => res.json())
            .then(data =>{
                let body = document.getElementById("tableBody");
                body.innerHTML = "";
                if(data.length === 0){
                    body.innerHTML = `
                    <tr>
                    <td colspan="4" class="text-center text-danger fw-bold"> ⚠ No earthquakes found after selected time</td>
</tr>`;
                    return;
                }
                data.forEach(eq =>{
                    let row = `<tr>
                                <td>${eq.magnitude}</td>
                                <td>${eq.place}</td>
                                <td>${new Date(eq.time)}</td>
                                <td><button class="btn btn-danger btn-sm" onclick="deleteEarthquake('${eq.id}')">Delete</button></td>
</tr>`;
                    body.innerHTML +=row;
                })
            })
    }
    function deleteEarthquake(id){
        fetch(`http://localhost:8080/api/earthquakes/${id}`,{
            method:"DELETE"
        }).then(()=>loadData());
    }
    let map = L.map('map').setView([20,0],2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    function clearMarkers(){
        map.eachLayer(layer =>{
            if (layer instanceof L.Marker){
                map.removeLayer(layer);
            }
        });
    }
</script>
</body>
</html>
